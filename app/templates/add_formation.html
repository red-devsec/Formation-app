{% extends "base.html" %}
{% block title %}Ajouter une formation{% endblock %}

{% block extra_styles %}
<style>
  .back-link {
    display: inline-flex; align-items: center; gap: .3rem;
    color: var(--muted); text-decoration: none;
    font-size: .875rem; margin-bottom: 1.25rem;
    transition: color .15s;
  }
  .back-link:hover { color: var(--text); }

  .form-card {
    max-width: 600px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
  }
  .form-card h1 {
    font-size: 1.35rem; font-weight: 800;
    color: var(--text); margin-bottom: 1.75rem;
  }

  .form-group { margin-bottom: 1.2rem; }

  label {
    display: block;
    font-size: .8rem; font-weight: 600;
    color: var(--muted);
    margin-bottom: .4rem;
    text-transform: uppercase; letter-spacing: .04em;
  }

  input[type=text],
  textarea,
  select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: .55rem .9rem;
    font-family: inherit; font-size: .9rem;
    outline: none; transition: border-color .15s, box-shadow .15s;
    -webkit-appearance: none;
  }
  input[type=text]:focus,
  textarea:focus,
  select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(47,129,247,.15);
  }
  textarea { resize: vertical; min-height: 85px; }
  select option { background: var(--surface); }

  .form-actions {
    display: flex; gap: .75rem; justify-content: flex-end;
    margin-top: 1.75rem; flex-wrap: wrap;
  }
  .btn-cancel {
    display: inline-flex; align-items: center;
    padding: .5rem 1.1rem; border-radius: 6px;
    font-size: .875rem; font-weight: 600;
    border: 1px solid var(--border);
    color: var(--muted); text-decoration: none;
    transition: color .15s, border-color .15s;
  }
  .btn-cancel:hover { color: var(--text); border-color: var(--muted); }

  @media (max-width: 480px) {
    .form-card { padding: 1.25rem 1rem; }
    .form-actions { justify-content: stretch; }
    .form-actions .btn,
    .form-actions .btn-cancel { flex: 1; justify-content: center; }
  }
</style>
{% endblock %}

{% block content %}
<a href="{{ url_for('main.formations') }}" class="back-link">← Retour aux formations</a>

<div class="form-card">
  <h1>Ajouter une formation</h1>
  <form method="POST">
    <div class="form-group">
      <label for="titre">Titre *</label>
      <input type="text" id="titre" name="titre" required
             placeholder="ex : Développement Web Full Stack"/>
    </div>
    <div class="form-group">
      <label for="description">Description *</label>
      <textarea id="description" name="description" required
                placeholder="Décrivez le contenu de la formation…"></textarea>
    </div>
    <div class="form-group">
      <label for="duree">Durée *</label>
      <input type="text" id="duree" name="duree" required
             placeholder="ex : 3 mois, 120 heures"/>
    </div>
    <div class="form-group">
      <label for="niveau">Niveau *</label>
      <select id="niveau" name="niveau" required>
        <option value="">-- Choisir --</option>
        <option>Débutant</option>
        <option>Débutant → Intermédiaire</option>
        <option>Intermédiaire</option>
        <option>Intermédiaire → Avancé</option>
        <option>Avancé</option>
      </select>
    </div>
    <div class="form-group">
      <label for="categorie">Catégorie *</label>
      <input type="text" id="categorie" name="categorie" required
             placeholder="ex : Développement Web, Data &amp; IA, Sécurité…"/>
    </div>
    <div class="form-actions">
      <a href="{{ url_for('main.formations') }}" class="btn-cancel">Annuler</a>
      <button type="submit" class="btn btn-primary" style="padding:.5rem 1.4rem;font-size:.9rem;">
        Enregistrer
      </button>
    </div>
  </form>
</div>
{% endblock %}
