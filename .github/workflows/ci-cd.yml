name: CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: formations_db
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t formation-app .

      - name: Test PostgreSQL connection
        run: |
          PGPASSWORD=admin123 psql -h localhost -U admin -d formations_db -c "SELECT 1"
        env:
          PGPASSWORD: admin123

      - name: Run container
        run: docker run -d -p 5000:5000 --name app formation-app

      - name: Wait for app
        run: sleep 5

      - name: Test homepage
        run: curl -f http://localhost:5000/ || echo "Test continue..."

      - name: Test health
        run: curl -f http://localhost:5000/health || echo "Test continue..."

      - name: Cleanup
        if: always()
        run: |
          docker stop app || true
          docker rm app || true
