version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: formations_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: formations_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - app_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d formations_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: formations_app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://admin:admin123@db:5432/formations_db
      SECRET_KEY: super-secret-key-change-in-prod
      FLASK_ENV: production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: formations_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@estsale.ma
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - app_network
    profiles:
      - tools

volumes:
  postgres_data:
    name: formations_postgres_data

networks:
  app_network:
    name: formations_network
    driver: bridge